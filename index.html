<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playable Comic</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .playable-container {
      perspective: 3000px;
      width: 100vw;
      height: 100vh;
      max-width: calc(100vh * 9 / 16);
      max-height: calc(100vw * 16 / 9);
      position: relative;
      background: linear-gradient(to bottom, #000000 0%, #0c0500 50%, #461902 90%, #5f1f00 100%);
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
      box-sizing: border-box;
    }

    /* СТАРТОВИЙ ОВЕРЛЕЙ */
    .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.4s ease;
    }

    .play-btn-circle {
      width: 90px;
      height: 90px;
      background: linear-gradient(to bottom, #ff7700, #ff4500);
      border: 3px solid #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 25px rgba(255, 69, 0, 0.9),
        0 0 10px #fff;
      animation: pulsePlay 1.6s infinite ease-in-out;
    }

    .play-triangle {
      width: 0;
      height: 0;
      border-top: 18px solid transparent;
      border-bottom: 18px solid transparent;
      border-left: 30px solid #fff;
      margin-left: 8px;
    }

    @keyframes pulsePlay {
      0%, 100% { transform: scale(1); box-shadow: 0 0 25px rgba(255, 69, 0, 0.9), 0 0 10px #fff; }
      50% { transform: scale(1.1); box-shadow: 0 0 40px rgba(255, 69, 0, 1), 0 0 20px #fff; }
    }

    .top-title-area {
      position: absolute;
      top: -4%;
      left: 5%;
      width: 90%;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .top-title-area.visible {
      opacity: 1;
    }

    .png-title {
      max-width: 90%;
      max-height: 100%;
      object-fit: contain;
    }

    /* КОНТЕЙНЕР КНИЖКИ  */
    .book-wrapper {
      position: absolute;
      top: 11%;
      left: 0%;
      width: 90%;
      height: 76%;
      overflow: visible;
      z-index: 2;
    }

    .page {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      transform-style: preserve-3d;
      transform-origin: left center;
      will-change: transform;
    }

    .front, .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
    }

    .front {
      transform: rotateY(0deg);
    }

    .back {
      transform: rotateY(180deg);
    }

    .page-curl-shadow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background: linear-gradient(
        to right,
        rgba(0,0,0,0.0) 40%,
        rgba(0,0,0,0.18) 70%,
        rgba(255,255,255,0.08) 85%,
        rgba(0,0,0,0.22) 100%
      );
      z-index: 20;
    }

    .page-back-shine {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background: linear-gradient(
        to left,
        rgba(255,255,255,0.0) 0%,
        rgba(255,255,255,0.06) 40%,
        rgba(255,255,255,0.13) 70%,
        rgba(255,255,255,0.04) 100%
      );
      z-index: 21;
    }

    .hidden {
      display: none !important;
    }

    .page-bg-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      z-index: 1;
    }

    /* КУТОЧОК ПЕРЕГОРТАННЯ ЯК НА ЗОБРАЖЕННІ */
    .corner-hint {
      position: absolute;
      top: 4.5%;
      right: 5%;
      width: 10%;
      height: auto;
      z-index: 25;
      cursor: pointer;
      pointer-events: auto;
      filter: drop-shadow(-2px 2px 4px rgba(0, 255, 0, 0.8));
      transform-origin: top right;
      animation: cornerPulse 1.8s infinite ease-in-out;
    }

    @keyframes cornerPulse {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(-2px 2px 4px rgba(0, 255, 0, 0.7));
      }
      50% {
        transform: scale(1.06) translate(-1px, 1px);
        filter: drop-shadow(-4px 4px 8px rgba(0, 255, 0, 1));
      }
    }

    /* ВНУТРІШНІЙ КОМІКС-АРТ  */
    .comic-art {
      position: absolute;
      top: 16.2%;
      left: 14.5%;
      width: 61.5%;
      height: 61.3%;
      object-fit: cover;
      pointer-events: none;
      z-index: 5;
    }

    .bubble-animated {
      position: absolute;
      object-fit: contain;
      pointer-events: none;
      z-index: 6;
      opacity: 0;
      transform: scale(0.85);
    }

    .page:not(.hidden) .bubble-animated {
      animation: bubblePopUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    #bubble1.show-bubble {
      animation: bubblePopUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes bubblePopUp {
      0%   { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ІДЕАЛЬНЕ РОЗМІЩЕННЯ ТЕКСТОВИХ БАБЛІВ ВІДНОСНО АРТУ */
    .comic-bubble_1     { top: 13.5%; left: 55%; width: 33%; }
    .comic-bubble_2     { top: 32%; left: 18%; width: 45%; }
    .comic-bubble_Yes_1 { top: 22%; left: 18%; width: 38%; }
    .comic-bubble_Yes_2 { top: 61%; left: 24%; width: 38%; }
    .comic-bubble_No    { top: 61%; left: 24%; width: 40%; }

    .page-content {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* НИЖНЯ ЗОНА КНОПОК  */
    .bottom-area {
      position: absolute;
      top: 80%;
      left: 0%;
      width: 100%;
      height: avto;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .bottom-area.visible {
      opacity: 1;
    }

    .png-btn {
      cursor: pointer;
      max-width: 100%;
      max-height: 85%;
      object-fit: contain;
      display: block;
    }

    .btn-choice-group {
      display: flex;
      gap: 12px;
      width: 100%;
      height: 100%;
      justify-content: space-between;
      align-items: center;
    }

    .btn-choice-group .png-btn {
      flex: 1;
      max-width: 48%;
      max-height: 85%;
    }

    .sub-text {
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
      text-align: center;
      user-select: none;
      position: absolute;
      bottom: 1%;
      width: 100%;
    }

    .bounce-effect {
      animation: mobileBounce 1.5s infinite ease-in-out;
    }

    @keyframes mobileBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }

    #musicToggle {
      position: absolute;
      top: 15px; right: 15px;
      font-size: 18px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      width: 38px; height: 38px;
      cursor: pointer;
      z-index: 100;
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="playable-container">

    <div class="play-overlay" id="startOverlay" onclick="handleStartPlayable()">
      <div class="play-btn-circle">
        <div class="play-triangle"></div>
      </div>
    </div>

    <audio id="bgMusic" src="assets/background.mp3" loop></audio>
    <audio id="bubble1Voice" src="assets/bubble1.mp3"></audio>
    <audio id="bubble2Voice" src="assets/bubble2.mp3"></audio>
    <audio id="bubbleYesVoice" src="assets/bubbleYes.mp3"></audio>
    <audio id="bubbleNoVoice" src="assets/bubbleNo.mp3"></audio>
    <audio id="pageFlipSound" src="assets/page-flip.mp3"></audio>

    <button id="musicToggle" onclick="toggleMusic()">🔊</button>

    <div class="top-title-area" id="titleArea">
      <img src="assets/title_1.png" class="png-title" alt="Title 1">
    </div>

    <div class="book-wrapper">

      <div class="page" id="page1">
        <div class="front">
          <img src="assets/Page_bg.png" class="page-bg-img" alt="Book Page">
          <img src="assets/corner.png" class="corner-hint" alt="Page Corner" onclick="handlePage1NextClick()">
          <div class="page-curl-shadow" id="curlShadow1"></div>
          <div class="page-back-shine"></div>
          <div class="page-content">
            <img src="assets/bg1.png" id="mainArt1" class="comic-art" alt="Art 1">
            <img src="assets/bubble1.png" id="bubble1" class="comic-bubble_1" alt="Bubble 1" style="opacity: 0; position: absolute; z-index: 6; object-fit: contain; pointer-events: none;">
          </div>
        </div>
        <div class="back"></div>
      </div>

      <div class="page hidden" id="page2">
        <div class="front">
          <img src="assets/Page_bg.png" class="page-bg-img" alt="Book Page">
          <img src="assets/corner.png" class="corner-hint" alt="Page Corner" onclick="handleChoice('pageYes')">
          <div class="page-curl-shadow" id="curlShadow2"></div>
          <div class="page-back-shine"></div>
          <div class="page-content">
            <img src="assets/bg2.png" class="comic-art" alt="Art 2">
            <img src="assets/bubble2.png" class="bubble-animated comic-bubble_2" alt="Bubble 2">
          </div>
        </div>
        <div class="back"></div>
      </div>

      <div class="page hidden" id="pageYes">
        <div class="front">
          <img src="assets/Page_bg.png" class="page-bg-img" alt="Book Page">
          <div class="page-curl-shadow" id="curlShadowYes"></div>
          <div class="page-back-shine"></div>
          <div class="page-content">
            <img src="assets/bgYes.png" class="comic-art" alt="Art Yes">
            <img src="assets/bubbleYes1.png" class="bubble-animated comic-bubble_Yes_1" alt="Bubble Yes 1">
            <img src="assets/bubbleYes2.png" class="bubble-animated comic-bubble_Yes_2" alt="Bubble Yes 2">
          </div>
        </div>
        <div class="back"></div>
      </div>

      <div class="page hidden" id="pageNo">
        <div class="front">
          <img src="assets/Page_bg.png" class="page-bg-img" alt="Book Page">
          <div class="page-curl-shadow" id="curlShadowNo"></div>
          <div class="page-back-shine"></div>
          <div class="page-content">
            <img src="assets/bgNo.png" class="comic-art" alt="Art No">
            <img src="assets/bubbleNo.png" class="bubble-animated comic-bubble_No" alt="Bubble No">
          </div>
        </div>
        <div class="back"></div>
      </div>

    </div>

    <div class="bottom-area" id="actionArea">
      <img src="assets/btn_find_out.png" class="png-btn bounce-effect" onclick="handlePage1NextClick()" alt="Find Out">
    </div>

  </div>

  <script>
    const bgMusic        = document.getElementById('bgMusic');
    const bubble1Voice   = document.getElementById('bubble1Voice');
    const bubble2Voice   = document.getElementById('bubble2Voice');
    const bubbleYesVoice = document.getElementById('bubbleYesVoice');
    const bubbleNoVoice  = document.getElementById('bubbleNoVoice');
    const pageFlipSound  = document.getElementById('pageFlipSound');

    bgMusic.volume        = 0.25;
    bubble1Voice.volume   = 0.9;
    bubble2Voice.volume   = 0.9;
    bubbleYesVoice.volume = 0.9;
    bubbleNoVoice.volume  = 0.9;
    pageFlipSound.volume  = 0.6;

    let isInteracted = false;

    const curlMap = {
      page1:   'curlShadow1',
      page2:   'curlShadow2',
      pageYes: 'curlShadowYes',
      pageNo:  'curlShadowNo'
    };

    function easeInCubic(t)    { return t * t * t; }
    function easeOutCubic(t)   { return 1 - Math.pow(1 - t, 3); }
    function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function animatePageFlip(el, curlEl, fromDeg, toDeg, duration, done) {
      const start   = performance.now();
      const shineEl = el.querySelector('.page-back-shine');

      function tick(now) {
        const raw = Math.min((now - start) / duration, 1);
        let deg, scaleX, scaleY, translateZ, shadowOp, shineOp;

        if (raw < 0.35) {
          const p    = easeInCubic(raw / 0.35);
          deg        = lerp(0,   -40,  p);
          scaleX     = lerp(1,   0.97, p);
          scaleY     = lerp(1,   0.98, p);
          translateZ = lerp(0,   18,   p);
          shadowOp   = lerp(0,   0.7,  p);
          shineOp    = 0;
        } else if (raw < 0.65) {
          const p    = easeInOutCubic((raw - 0.35) / 0.30);
          deg        = lerp(-40,  -140, p);
          const arc  = Math.sin(p * Math.PI);
          scaleX     = lerp(0.97, 0.97, p) - arc * 0.10;
          scaleY     = lerp(0.98, 0.98, p) - arc * 0.04;
          translateZ = lerp(18,   18,   p) + arc * 8;
          shadowOp   = lerp(0.7,  0.7,  p) - arc * 0.15;
          shineOp    = arc * 0.9;
        } else {
          const p    = easeOutCubic((raw - 0.65) / 0.35);
          deg        = lerp(-140, -180, p);
          scaleX     = lerp(0.97, 1,    p);
          scaleY     = lerp(0.98, 1,    p);
          translateZ = lerp(18,   0,    p);
          shadowOp   = lerp(0.55, 0,    p);
          shineOp    = lerp(0.3,  0,    p);
        }

        el.style.transform =
          `rotateY(${deg}deg) scaleX(${scaleX}) scaleY(${scaleY}) translateZ(${translateZ}px)`;

        if (curlEl) curlEl.style.opacity = String(shadowOp);
        if (shineEl) shineEl.style.opacity = String(shineOp);

        if (raw < 1) {
          requestAnimationFrame(tick);
        } else {
          el.style.transform = `rotateY(${toDeg}deg)`;
          if (curlEl)  curlEl.style.opacity  = '0';
          if (shineEl) shineEl.style.opacity = '0';
          done();
        }
      }
      requestAnimationFrame(tick);
    }

    function goToPage(nextPageId) {
      const current = document.querySelector('.page:not(.hidden)');
      const next    = document.getElementById(nextPageId);
      if (!current || !next) return;

      if (isInteracted) {
        pageFlipSound.currentTime = 0;
        pageFlipSound.play().catch(() => {});
      }

      const curlEl = document.getElementById(curlMap[current.id] || null);

      next.classList.remove('hidden');
      next.style.zIndex    = '1';
      current.style.zIndex = '3';

      animatePageFlip(current, curlEl, 0, -180, 1100, () => {
        current.classList.add('hidden');
        current.style.transform = '';
        current.style.zIndex    = '';
        next.style.zIndex       = '2';

        if (nextPageId === 'pageYes') {
          bubbleYesVoice.onended = null;
          bubbleYesVoice.onended = function() {
            playBubbleVoice('bubbleNoVoice');
          };
          playBubbleVoice('bubbleYesVoice');
        } else if (nextPageId === 'pageNo') {
          playBubbleVoice('bubbleNoVoice');
        }
      });
    }

    function handleStartPlayable() {
      isInteracted = true;
      const overlay = document.getElementById('startOverlay');
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 400);

      document.getElementById('titleArea').classList.add('visible');
      document.getElementById('actionArea').classList.add('visible');
      document.getElementById('bubble1').classList.add('show-bubble');

      bgMusic.play().catch(() => {});
      playBubbleVoice('bubble1Voice');
    }

    function handlePage1NextClick() {
      if (!isInteracted) return;
      startPlayable();
    }

    function startPlayable() {
      document.getElementById('titleArea').innerHTML = `
        <img src="assets/title_2.png" class="png-title" alt="Title 2">
      `;

      document.getElementById('actionArea').innerHTML = `
        <div class="btn-choice-group">
          <img src="assets/btn_yes.png" class="png-btn" onclick="handleChoice('pageYes')" alt="Yes">
          <img src="assets/btn_no.png" class="png-btn" onclick="handleChoice('pageNo')" alt="No">
        </div>
      `;

      goToPage('page2');
      setTimeout(() => playBubbleVoice('bubble2Voice'), 1100);
    }

    function handleChoice(targetPageId) {
      document.getElementById('titleArea').innerHTML = '';

      document.getElementById('actionArea').innerHTML = `
        <img src="assets/btn_cta.png" class="png-btn bounce-effect" onclick="handleCTA()" alt="Read Story">
        <div class="sub-text">Free registration on HoneyToon</div>
      `;

      goToPage(targetPageId);
    }

    function handleCTA() {
      window.open('https://honeytoon.com/comic/may-i-watch-at-least', '_self');
    }

    function toggleMusic() {
      const btn = document.getElementById('musicToggle');
      if (bgMusic.paused) { bgMusic.play(); btn.textContent = "🔊"; }
      else                 { bgMusic.pause(); btn.textContent = "🔇"; }
    }

    function playBubbleVoice(id) {
      const audio = document.getElementById(id);
      if (audio && isInteracted) {
        audio.currentTime = 0;
        audio.play().catch(() => {});
      }
    }
  </script>
</body>
</html>
