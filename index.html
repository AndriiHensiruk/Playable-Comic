<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playable Comic - Desktop</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .playable-container {
      width: 100vw;
      height: 100vh;
      max-width: calc(100vh * 16 / 11);
      max-height: calc(100vw * 11 / 16);
      position: relative;
      background: linear-gradient(to bottom, #000000 0%, #1a0800 30%, #7a2e00 70%, #c45500 100%);
      box-shadow: 0 0 60px rgba(0,0,0,0.9);
      box-sizing: border-box;
    }

    /* ОВЕРЛЕЙ СТАРТУ */
    .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.4s ease;
    }

    .play-btn-circle {
      width: 100px;
      height: 100px;
      background: linear-gradient(to bottom, #ff7700, #ff4500);
      border: 3px solid #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(255, 69, 0, 0.9), 0 0 10px #fff;
      animation: pulsePlay 1.6s infinite ease-in-out;
    }

    .play-triangle {
      width: 0;
      height: 0;
      border-top: 20px solid transparent;
      border-bottom: 20px solid transparent;
      border-left: 32px solid #fff;
      margin-left: 10px;
    }

    @keyframes pulsePlay {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* ЗАГОЛОВКИ КАРТИНКАМИ */
    .top-title-area {
      position: absolute;
      top: 3%;
      left: 5%;
      width: 90%;
      height: 11%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .top-title-area.visible { opacity: 1; }
    .png-title { max-width: 80%; max-height: 100%; object-fit: contain; }

    /* БЛОК КНИГИ */
    .book-container {
      position: absolute;
      top: 10%;
      left: 4%;
      width: 92%;
      height: 68%;
      perspective: 2000px;
      z-index: 2;
    }

    .book-base-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 110%;
      object-fit: fill;
      z-index: 1;
      border-radius: 4px;
    }

    /* СУЦІЛЬНІ ФІНАЛЬНІ РОЗВОРОТИ */
    .comic-art-full {
      position: absolute;
      top: 12%;
      left: 6%;
      width: 88%;
      height: 82%;
      object-fit: contain;
      z-index: 12;
      display: none;
    }
    .comic-art-full.visible { display: block; }

    /* СТАТИЧНИЙ СЛОЙ СТОРІНОК */
    .book-static-content {
      position: absolute;
      inset: 0;
      display: flex;
      z-index: 15;
      pointer-events: none;
    }

    .left-page-zone, .right-page-zone {
      width: 50%;
      height: 100%;
      position: relative;
    }

    /* АРТИ КОМІКСУ */
    .comic-art-left, .comic-art-right {
      position: absolute;
      top: 8%;
      width: 72%;
      height: 82%;
      object-fit: contain;
    }
    .comic-art-left { left: 12%; }
    .comic-art-right { left: 10%; }

    /* МЕХАНІКА КНИЖКОВОГО ПЕРЕГОРТАННЯ */
    .flip-wrapper-right {
      position: absolute;
      top: 0;
      right: 0;
      width: 50%;
      height: 110%;
      perspective: 1500px;
      z-index: 15;
      pointer-events: none;
    }

    .paper {
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transform-origin: left center;
      transition: transform 1.1s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: auto;
      display: none;
    }

    .paper.active { display: block; }
    .paper.flipped { transform: rotateY(-180deg); }

    .page-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    .front-side {
      background: url('assets/Page_bg.png') no-repeat right center;
      background-size: 200% 100%;
    }
    .back-side {
      background: url('assets/Page_bg.png') no-repeat left center;
      background-size: 200% 100%;
      transform: rotateY(180deg);
    }

    /* КУТОЧОК СТОРІНКИ */
    .corner-hint {
      position: absolute;
      top: 8%;
      right: 13%;
      width: 11%;
      height: auto;
      z-index: 55;
      cursor: pointer;
      pointer-events: auto;
      filter: drop-shadow(-2px 2px 4px rgba(180, 180, 180, 0.6));
      animation: cornerPulse 1.8s infinite ease-in-out;
    }

    @keyframes cornerPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.08) translate(-1px, 1px); }
    }

    /* БАБЛИ */
    .bubble-animated {
      position: absolute;
      object-fit: contain;
      pointer-events: none;
      z-index: 60;
      opacity: 0;
      transform: scale(0.85);
    }

    .show-bubble {
      animation: bubblePopUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s forwards;
    }

    @keyframes bubblePopUp {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    .bubble-p1 { top: 4%; left: 56%; width: 24%; }
    .bubble-p2 { top: 52%; left: 15%; width: 32%; }
    .bubble-pNo { top: 75%; left: 32%; width: 16%; }
    .bubble-pYes { top: 5%; left: 29%; width: 16%; }
    .bubble-pYes-husband { top: 80%; left: 43%; width: 16%; }

    /* НИЖНЯ ЗОНА КНОПОК */
    .bottom-area {
      position: absolute;
      top: 80%;
      left: 10%;
      width: 80%;
      height: 21%;
      z-index: 80;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      gap: 6px;
    }

    .bottom-area.visible { opacity: 1; }

    .png-btn {
      cursor: pointer;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .btn-choice-group {
      display: flex;
      gap: 24px;
      width: 55%;
      height: 100%;
      justify-content: center;
      align-items: center;
    }

    .btn-choice-group .png-btn { flex: 1; max-height: 100%; }

    .sub-text {
      color: rgba(255, 255, 255, 0.85);
      font-size: clamp(11px, 1.4vw, 15px);
      text-align: center;
      user-select: none;
      margin-top: 4px;
    }

    .bounce-effect { animation: desktopBounce 1.5s infinite ease-in-out; }

    @keyframes desktopBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }

    #musicToggle {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 18px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      z-index: 100;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="playable-container">

    <div class="play-overlay" id="startOverlay" onclick="handleStartPlayable()">
      <div class="play-btn-circle">
        <div class="play-triangle"></div>
      </div>
    </div>

    <audio id="bgMusic"       src="assets/background.mp3" loop></audio>
    <audio id="bubble1Voice"  src="assets/bubble1.mp3"></audio>
    <audio id="bubble2Voice"  src="assets/bubble2.mp3"></audio>
    <audio id="bubbleYesVoice" src="assets/bubbleYes.mp3"></audio>
    <audio id="bubbleNoVoice"  src="assets/bubbleNo.mp3"></audio>
    <audio id="pageFlipSound" src="assets/page-flip.mp3"></audio>

    <button id="musicToggle" onclick="toggleMusic()">🔊</button>

    <div class="top-title-area" id="titleArea">
      <img src="assets/title_1.png" class="png-title" id="titleImg" alt="Title">
    </div>

    <div class="book-container">
      <img src="assets/Page_bg.png" class="book-base-bg" alt="Book Background">

      <img src="assets/bgYes.webp" class="comic-art-full" id="finalArtYes" alt="Art Yes">
      <img src="assets/bgNo.webp" class="comic-art-full" id="finalArtNo" alt="Art No">

      <div class="book-static-content" id="staticLayer">
        <div class="left-page-zone" id="leftZone">
          <img src="assets/bg1.webp" class="comic-art-left" id="leftPageArt" alt="Left Art">
          <img src="assets/bubble1.png" id="bubble1" class="bubble-animated bubble-p1" alt="Bubble 1">
        </div>

        <div class="right-page-zone" id="rightZone"></div>

        <img src="assets/bubbleYes1.png" class="bubble-animated bubble-pYes" id="bubbleYesImg1" alt="Bubble Yes 1">
        <img src="assets/bubbleYes2.png" class="bubble-animated bubble-pYes-husband" id="bubbleYesImg2" alt="Bubble Yes 2">
        <img src="assets/bubbleNo.png" class="bubble-animated bubble-pNo" id="bubbleNoImg" alt="Bubble No">
      </div>

      <div class="flip-wrapper-right" id="flipWrapperRight">
        <div class="paper" id="bookPaper">
          <div class="page-face front-side" id="frontFace"></div>
          <div class="page-face back-side" id="backFace"></div>
        </div>
      </div>
    </div>

    <div class="bottom-area" id="actionArea">
      <img src="assets/btn_find_out.png" class="png-btn bounce-effect" onclick="flipThePage()" alt="Find Out">
    </div>

  </div>

  <script {STRICT_COMPLETION}>
    const bgMusic         = document.getElementById('bgMusic');
    const bubble1Voice    = document.getElementById('bubble1Voice');
    const bubble2Voice    = document.getElementById('bubble2Voice');
    const bubbleYesVoice  = document.getElementById('bubbleYesVoice');
    const bubbleNoVoice   = document.getElementById('bubbleNoVoice');
    const pageFlipSound   = document.getElementById('pageFlipSound');

    bgMusic.volume        = 0.35;
    bubble1Voice.volume   = 0.9;
    bubble2Voice.volume   = 0.9;
    bubbleYesVoice.volume = 0.9;
    bubbleNoVoice.volume  = 0.9;
    pageFlipSound.volume  = 0.6;

    let isInteracted = false;
    let step = 1;

    function handleStartPlayable() {
      isInteracted = true;
      const overlay = document.getElementById('startOverlay');
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 400);

      document.getElementById('titleArea').classList.add('visible');
      document.getElementById('actionArea').classList.add('visible');
      document.getElementById('bubble1').classList.add('show-bubble');

      showCornerHint();

      bgMusic.play().catch(() => {});
      playBubbleVoice('bubble1Voice');
    }

    function showCornerHint() {
      const rightZone = document.getElementById('rightZone');
      rightZone.innerHTML = `
        <img src="assets/corner.png" class="corner-hint" id="cornerBtn" onclick="flipThePage()" alt="Fold Corner">
      `;
    }

    function flipThePage() {
      if (!isInteracted || step !== 1) return;
      step = 2;

      document.getElementById('backFace').innerHTML = `
        <img src="assets/bg1.webp" style="position:absolute; top:8%; left:12%; width:72%; height:82%; object-fit:contain;" alt="Art 1 back">
      `;

      pageFlipSound.currentTime = 0;
      pageFlipSound.play().catch(() => {});

      document.getElementById('rightZone').innerHTML = `
        <img src="assets/bg2.webp" class="comic-art-right" alt="Art 2">
      `;

      const paper = document.getElementById('bookPaper');
      paper.classList.add('active');
      
      setTimeout(() => {
        paper.classList.add('flipped');
      }, 20);

      const titleImg = document.getElementById('titleImg');
      if (titleImg) titleImg.src = 'assets/title_2.png';

      setTimeout(() => {
        paper.classList.remove('active');
        paper.classList.remove('flipped'); 

        const rightZone = document.getElementById('rightZone');
        rightZone.insertAdjacentHTML('beforeend', `
          <img src="assets/bubble2.png" class="bubble-animated bubble-p2" id="bubble2img" alt="Bubble 2">
        `);

        setTimeout(() => {
          document.getElementById('bubble2img').classList.add('show-bubble');
        }, 50);

        playBubbleVoice('bubble2Voice');

        document.getElementById('actionArea').innerHTML = `
          <div class="btn-choice-group">
            <img src="assets/btn_yes.png" class="png-btn" onclick="handleChoice('Yes')" alt="Yes">
            <img src="assets/btn_no.png"  class="png-btn" onclick="handleChoice('No')"  alt="No">
          </div>
        `;
      }, 1100);
    }

    function handleChoice(decision) {
      if (step !== 2) return;
      step = 3;

      document.getElementById('titleArea').classList.remove('visible');
      const paper = document.getElementById('bookPaper');

      const leftImg = decision === 'Yes' ? 'assets/bgYes_left.webp' : 'assets/bgNo_left.webp';
      const rightImg = decision === 'Yes' ? 'assets/bgYes_right.webp' : 'assets/bgNo_right.webp';

      document.getElementById('leftZone').innerHTML = `
        <img src="assets/bg1.webp" class="comic-art-left" alt="Final Left">
      `;
      document.getElementById('rightZone').innerHTML = `
        <img src="${rightImg}" style="position:absolute; top:13%; left:-14%; width:72%; height:82%; object-fit:contain; transform: scaleX(1);" alt="Final Right Static Under">
      `;

      const front = document.getElementById('frontFace'); front.innerHTML = '';
      front.innerHTML = `
        <img src="assets/bg2.webp" style="position:absolute; top:5%; left:10%; width:72%; height:82%; object-fit:contain;" alt="Art 2 front">
      `;

      const back = document.getElementById('backFace'); back.innerHTML = '';
      back.innerHTML = `
        <img src="${leftImg}" style="position:absolute; top:12%; left:42%; width:72%; height:72%; object-fit:contain; transform: scaleX(1);" alt="Final Left Flipped">
      `;

      pageFlipSound.currentTime = 0;
      pageFlipSound.play().catch(() => {});

      paper.classList.add('active');

      setTimeout(() => {
        paper.classList.add('flipped');
      }, 20);

      setTimeout(() => {
        paper.classList.remove('active');
        document.getElementById('flipWrapperRight').style.display = 'none';
        
        document.getElementById('leftZone').innerHTML = '';
        document.getElementById('rightZone').innerHTML = '';

        document.getElementById('finalArt' + decision).classList.add('visible');

        const bubbles = decision === 'No' ? ['bubbleNoImg'] : ['bubbleYesImg1', 'bubbleYesImg2'];
        bubbles.forEach(id => {
          const el = document.getElementById(id);
          el.classList.add('show-bubble');
        });

        if (decision === 'Yes') {
          playBubbleVoice('bubbleYesVoice');
          setTimeout(() => playBubbleVoice('bubbleNoVoice'), 2000);
        } else {
          playBubbleVoice('bubbleNoVoice');
        }

        document.getElementById('actionArea').innerHTML = `
          <img src="assets/btn_cta.png" class="png-btn bounce-effect" onclick="handleCTA()" alt="Read Story">
          <div class="sub-text">Free registration on HoneyToon</div>
        `;
      }, 1100);
    }

    function handleCTA() {
      window.open('https://honeytoon.com/comic/may-i-watch-at-least', '_self');
    }

    function toggleMusic() {
      const btn = document.getElementById('musicToggle');
      if (bgMusic.paused) {
        bgMusic.play();
        btn.textContent = '🔊';
      } else {
        bgMusic.pause();
        btn.textContent = '🔇';
      }
    }

    function playBubbleVoice(id) {
      const audio = document.getElementById(id);
      if (audio && isInteracted) {
        audio.currentTime = 0;
        audio.play().catch(() => {});
      }
    }
  </script>
</body>
</html>
